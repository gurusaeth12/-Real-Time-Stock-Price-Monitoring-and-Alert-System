<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — StockAlert Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10; --surface: #0e1520; --card: #121b28;
      --border: #1e2d42; --accent: #00e5a0; --accent2: #0094ff;
      --warn: #ff4444; --text: #e8f0fe; --muted: #6b7e96;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .container {
      width: 100%; max-width: 440px;
      padding: 1.5rem;
      position: relative; z-index: 1;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.8rem; letter-spacing: 2px;
      color: var(--accent); text-align: center;
      margin-bottom: 0.3rem;
    }
    .logo span { color: var(--text); }
    .subtitle {
      text-align: center; color: var(--muted);
      font-size: 0.8rem; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 2.5rem;
      font-family: var(--font-mono);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2.5rem;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 2rem; letter-spacing: 1px;
      margin-bottom: 2rem;
    }
    .field { margin-bottom: 1.3rem; }
    label {
      display: block;
      font-size: 0.75rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      font-family: var(--font-mono);
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #080c10;
      border: none;
      padding: 0.9rem;
      font-family: var(--font-body);
      font-weight: 700; font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }
    .btn-submit:hover { opacity: 0.88; }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0; color: var(--muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-google {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      font-family: var(--font-body);
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      transition: border-color 0.2s;
    }
    .btn-google:hover { border-color: var(--accent2); }
    .error-msg {
      background: rgba(255,68,68,0.1);
      border: 1px solid var(--warn);
      color: var(--warn);
      padding: 0.6rem 1rem;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }
    .footer-link {
      text-align: center; margin-top: 1.5rem;
      font-size: 0.85rem; color: var(--muted);
    }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .back-link {
      display: block; text-align: center;
      margin-top: 1.5rem;
      color: var(--muted); font-size: 0.82rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">STOCK<span>ALERT</span></div>
  <div class="subtitle">// Investor Portal</div>

  <div class="card">
    <div class="card-title">SIGN IN</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn-submit" onclick="handleLogin()">LOGIN →</button>

    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.2l-6.3-5.4C29.5 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.3C9.6 35.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.4C37 39 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <div class="footer-link">
    Don't have an account? <a href="register.html">Register here</a>
  </div>
  <a class="back-link" href="../index.html">← Back to Home</a>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showError('Please fill in all fields.');
    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showError(e.message);
    }
  }

  async function handleGoogleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showError(e.message);
    }
  }

  // If already logged in, redirect
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
