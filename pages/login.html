<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — StockPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080f;--surface:#0b1120;--card:#0f1929;--border:#1a2840;
  --accent:#00d4aa;--red:#ef4444;--text:#f0f6ff;--muted:#64748b;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,212,170,0.07),transparent);
  pointer-events:none}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;justify-content:center;text-decoration:none}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#05080f;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:1.2rem;font-weight:700;color:var(--text)}
.logo-text span{color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem}
.card-title{font-size:1.4rem;font-weight:700;margin-bottom:0.3rem}
.card-sub{font-size:0.875rem;color:var(--muted);margin-bottom:1.75rem}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.35);
  color:#fca5a5;padding:0.7rem 1rem;border-radius:8px;font-size:0.85rem;
  margin-bottom:1rem;display:none}
.field{margin-bottom:1rem}
label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);
  letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase}
input{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:0.7rem 1rem;border-radius:8px;
  font-family:var(--mono);font-size:0.9rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
.btn-main{width:100%;background:var(--accent);color:#05080f;border:none;
  padding:0.8rem;border-radius:8px;font-family:var(--font);font-weight:700;
  font-size:0.95rem;cursor:pointer;transition:opacity .2s;margin-top:0.25rem}
.btn-main:hover{opacity:0.85}
.btn-main:disabled{opacity:0.5;cursor:not-allowed}
.or{display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--muted);font-size:0.8rem}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:0.75rem;border-radius:8px;font-family:var(--font);
  font-size:0.9rem;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s}
.btn-google:hover{border-color:var(--accent);background:rgba(0,212,170,0.05)}
.btn-google:disabled{opacity:0.5;cursor:not-allowed}
.foot{text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--muted)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.back{display:block;text-align:center;margin-top:1rem;
  color:var(--muted);font-size:0.82rem;text-decoration:none}
.back:hover{color:var(--text)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(5,8,15,0.3);
  border-top-color:#05080f;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="../index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span class="logo-text">Stock<span>Pulse</span></span>
  </a>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your StockPulse account</div>

    <div class="err" id="errMsg"></div>

    <!-- GOOGLE SIGN IN -->
    <button class="btn-google" id="googleBtn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.2l-6.3-5.4C29.5 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.3C9.6 35.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.4C37 39 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/>
      </svg>
      Continue with Google
    </button>

    <div class="or">or</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-main" id="loginBtn" onclick="emailLogin()">Sign in</button>
  </div>

  <div class="foot">Don't have an account? <a href="register.html">Create one</a></div>
  <a class="back" href="../index.html">← Back to home</a>
</div>

<!-- ✅ FIREBASE SDKs MUST LOAD FIRST -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- ✅ THEN config (auth variable is defined here) -->
<script src="../firebase-config.js"></script>
<script>
function showErr(msg){
  const el=document.getElementById('errMsg');
  el.textContent=msg;el.style.display='block';
}
function setLoading(id,on){
  const b=document.getElementById(id);
  b.disabled=on;
  if(id==='loginBtn') b.innerHTML=on?'<span class="spin"></span>Signing in…':'Sign in';
  if(id==='googleBtn') b.innerHTML=on?'<span class="spin"></span>Opening Google…':`<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.2l-6.3-5.4C29.5 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.3C9.6 35.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.4C37 39 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>Continue with Google`;
}

async function emailLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!email||!pass) return showErr('Please enter email and password.');
  setLoading('loginBtn',true);
  try{
    await auth.signInWithEmailAndPassword(email,pass);
    window.location.href='dashboard.html';
  }catch(e){
    setLoading('loginBtn',false);
    showErr(e.message.replace('Firebase: ','').replace(/\(.*\)/,''));
  }
}

async function googleLogin(){
  setLoading('googleBtn',true);
  const provider=new firebase.auth.GoogleAuthProvider();
  try{
    await auth.signInWithPopup(provider);
    window.location.href='dashboard.html';
  }catch(e){
    setLoading('googleBtn',false);
    if(e.code==='auth/popup-blocked'){
      // fallback to redirect if popup is blocked
      auth.signInWithRedirect(provider);
    } else {
      showErr(e.message.replace('Firebase: ','').replace(/\(.*\)/,''));
    }
  }
}

// Enter key support
document.getElementById('password').addEventListener('keydown',e=>{
  if(e.key==='Enter') emailLogin();
});

// Already logged in → go to dashboard
auth.onAuthStateChanged(u=>{ if(u) window.location.href='dashboard.html'; });
</script>
</body>
</html>
