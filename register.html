<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — StockAlert Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10; --surface: #0e1520; --card: #121b28;
      --border: #1e2d42; --accent: #00e5a0; --accent2: #0094ff;
      --warn: #ff4444; --text: #e8f0fe; --muted: #6b7e96;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .container { width: 100%; max-width: 460px; padding: 1.5rem; position: relative; z-index: 1; }
    .logo { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); text-align: center; margin-bottom: 0.3rem; }
    .logo span { color: var(--text); }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2.5rem; font-family: var(--font-mono); }
    .card { background: var(--card); border: 1px solid var(--border); padding: 2.5rem; }
    .card-title { font-family: var(--font-display); font-size: 2rem; letter-spacing: 1px; margin-bottom: 2rem; }
    .field { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 0.4rem; }
    input, select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; font-family: var(--font-mono); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }
    .btn-submit { width: 100%; background: var(--accent); color: #080c10; border: none; padding: 0.9rem; font-family: var(--font-body); font-weight: 700; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; letter-spacing: 1px; }
    .btn-submit:hover { opacity: 0.88; }
    .error-msg { background: rgba(255,68,68,0.1); border: 1px solid var(--warn); color: var(--warn); padding: 0.6rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .success-msg { background: rgba(0,229,160,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 0.6rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.82rem; text-decoration: none; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">STOCK<span>ALERT</span></div>
  <div class="subtitle">// Create Account</div>
  <div class="card">
    <div class="card-title">REGISTER</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <div class="field"><label>Full Name</label><input type="text" id="fullname" placeholder="Your full name"/></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="+91 9876543210"/></div>
    <div class="field">
      <label>Investment Experience</label>
      <select id="experience">
        <option value="">Select level</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters"/></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="Re-enter password"/></div>
    <button class="btn-submit" onclick="handleRegister()">CREATE ACCOUNT →</button>
  </div>
  <div class="footer-link">Already have an account? <a href="login.html">Sign in</a></div>
  <a class="back-link" href="../index.html">← Back to Home</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function handleRegister() {
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const experience = document.getElementById('experience').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!fullname || !email || !password || !confirm) return showError('Please fill all required fields.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (password.length < 6) return showError('Password must be at least 6 characters.');

    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      // Save user profile to Firestore
      await db.collection('users').doc(cred.user.uid).set({
        fullname, email, phone, experience,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await cred.user.updateProfile({ displayName: fullname });
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch(e) {
      showError(e.message);
    }
  }

  auth.onAuthStateChanged(user => { if (user) window.location.href = 'dashboard.html'; });
</script>
</body>
</html>
